<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Senn's Sweet 17</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <canvas id="ocean-canvas"></canvas>
  <div class="bg-decor"></div>

  <main class="page">
    <div class="container">
      <form class="admin-card glass fade-in" id="admin-login-form">
        <div class="eyebrow" style="text-align:center;">Private Access</div>
        <h1>Admin Login</h1>

        <div class="form-group">
          <label for="admin-username">Username</label>
          <input type="text" id="admin-username" required placeholder="Username" />
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" required placeholder="Password" />
        </div>

        <div class="pin-message" id="admin-message"></div>

        <button type="submit" class="btn btn-primary rsvp-submit">Login</button>
      </form>
    </div>
  </main>

  <script src="js/effects.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
