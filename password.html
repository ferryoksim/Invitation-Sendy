<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Secret Invitation — Senn's Sweet 17</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <canvas id="ocean-canvas"></canvas>
  <div class="bg-decor"></div>

  <main class="page">
    <div class="container">
      <div class="password-card glass fade-in" id="password-card">
        <div class="eyebrow">Sweet Seventeen</div>
        <h1>A Secret Invitation</h1>
        <p class="lead">Before opening this invitation,<br />please enter the secret code.</p>

        <input type="password" id="pin-input" class="pin-input" maxlength="8" placeholder="••••" inputmode="numeric" />
        <div class="pin-hint">Hint: It's my birth year.</div>
        <div class="pin-message" id="pin-message"></div>

        <button class="btn btn-primary" id="submit-pin">Unlock</button>
        <button class="btn btn-primary hidden" id="start-btn" style="display:none; margin-top:14px;">Start</button>
      </div>
    </div>
  </main>

  <button class="music-toggle glass" id="music-toggle">🔇</button>
  <audio id="bg-audio" loop preload="none">
    <source src="assets/audio/ocean-piano.mp3" type="audio/mpeg" />
  </audio>

  <script src="js/effects.js"></script>
  <script src="js/password.js"></script>
</body>
</html>
